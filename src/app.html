<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/clawpal-logo.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/clawpal-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ClawPal - Your Crypto Bestie. Chat your way to crypto gains on Solana and Base. No more clicking through complex UIs." />
    <meta name="theme-color" content="#0A0A0F" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ClawPal - Talk to Your Crypto Wallet" />
    <meta property="og:description" content="Swap, send, and manage your crypto by just typing what you want. Your AI-powered crypto assistant." />
    <meta property="og:image" content="%sveltekit.assets%/clawpal-logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ClawPal - Talk to Your Crypto Wallet" />
    <meta name="twitter:description" content="Swap, send, and manage your crypto by just typing what you want." />
    <meta name="twitter:image" content="%sveltekit.assets%/clawpal-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
